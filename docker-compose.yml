# ─── SHARED ENV for Airflow components ───────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Our pipeline DB connection (passed into DAGs via env)
    PIPELINE_DB_CONN: postgresql://pipeline:pipeline@timescaledb:5432/marketdata
  volumes:
    - ./dags:/opt/airflow/dags
    - ./extractors:/opt/airflow/extractors
    - ./transformers:/opt/airflow/transformers
    - ./loaders:/opt/airflow/loaders
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:

  # ─── 1. TimescaleDB ─────────────────────────────────────────────────────────
  # This is our MAIN data store — PostgreSQL with the TimescaleDB extension.
  # All OHLCV market data lives here.
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: marketdata
    ports:
      - "5433:5432"   # 5433 on host to avoid conflict with local Postgres
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # auto-runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d marketdata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 2. Postgres for Airflow metadata ───────────────────────────────────────
  # Airflow needs its own DB to track DAG runs, task states, logs etc.
  # Keep it separate from our market data DB.
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 3. Airflow init ────────────────────────────────────────────────────────
  # One-shot container: migrates the Airflow DB and creates the admin user.
  # Runs once then exits — that's normal.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Ahmed \
          --lastname Berrada \
          --role Admin \
          --email admin@example.com
    restart: "no"

  # ─── 4. Airflow Webserver ───────────────────────────────────────────────────
  # The UI at http://localhost:8080 — admin/admin to log in
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── 5. Airflow Scheduler ───────────────────────────────────────────────────
  # The brain — scans DAGs, triggers tasks on schedule.
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── 6. FastAPI ─────────────────────────────────────────────────────────────
  # REST API layer — the frontend calls this to get chart data.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://pipeline:pipeline@timescaledb:5432/marketdata
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescale-data:
  airflow-db:
  airflow-logs:
